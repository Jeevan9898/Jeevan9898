<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Git City — Jeevan9898</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;cursor:none}
#c{display:block;width:100vw;height:100vh;cursor:none}

/* ─── CUSTOM CURSOR ──────────────────────────────── */
#cursor{
  position:fixed;pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:transform .08s ease;
  top:0;left:0
}
#cursor svg{
  overflow:visible;
  filter:drop-shadow(0 0 4px rgba(0,242,255,.8));
}
#cursor.hover .cur-ring{stroke:#fff;stroke-width:1.2}
#cursor.hover .cur-cross{stroke:#fff}

/* ─── LOADER ─────────────────────────────────────── */
#loader{
  position:fixed;inset:0;z-index:500;
  background:#000010;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;font-family:'Share Tech Mono',monospace;
  transition:opacity 1.2s
}
.ld-ring-wrap{position:relative;width:100px;height:100px;display:flex;align-items:center;justify-content:center}
.ld-r{position:absolute;border-radius:50%;border:1px solid transparent}
.ld-r:nth-child(1){inset:0;border-top-color:#00f2ff;border-right-color:rgba(0,242,255,.2);animation:ldspin 2.2s linear infinite}
.ld-r:nth-child(2){inset:12px;border-bottom-color:rgba(0,200,255,.5);animation:ldspin 3.5s linear infinite reverse}
.ld-r:nth-child(3){inset:24px;border-top-color:rgba(0,242,255,.3);animation:ldspin 5s linear infinite}
.ld-dot{width:6px;height:6px;background:#00f2ff;border-radius:50%;box-shadow:0 0 12px #00f2ff,0 0 24px rgba(0,242,255,.4)}
#ld-title{font-family:'Orbitron',monospace;font-size:15px;letter-spacing:8px;color:#00f2ff;
  text-shadow:0 0 20px #00f2ff,0 0 50px rgba(0,242,255,.25);text-align:center}
#ld-sub{font-size:8px;letter-spacing:4px;color:rgba(0,242,255,.35);text-align:center}
.ld-bar{width:240px;height:1.5px;background:#030e1a;position:relative;overflow:hidden}
.ld-bar::after{content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(0,242,255,.2),transparent);
  animation:ldshim 1.6s ease-in-out infinite}
#ld-prog{height:100%;width:0%;background:#00f2ff;
  transition:width .4s;box-shadow:0 0 10px #00f2ff}
#ld-msg{font-size:8px;letter-spacing:3px;color:rgba(0,242,255,.35);min-height:14px;text-align:center}

/* ─── HUD TOP ─────────────────────────────────────── */
#hud{
  position:fixed;top:0;left:0;right:0;z-index:30;
  padding:18px 28px;
  display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(180deg,rgba(0,0,0,.85) 0%,transparent 100%);
  pointer-events:none;font-family:'Share Tech Mono',monospace
}
.hud-title{font-family:'Orbitron',monospace;font-size:14px;letter-spacing:6px;
  color:#00f2ff;text-shadow:0 0 16px #00f2ff,0 0 40px rgba(0,242,255,.2);margin-bottom:3px}
.hud-sub{font-size:7px;letter-spacing:3.5px;color:rgba(0,242,255,.32)}
.hud-stats{display:flex;gap:28px}
.hstat{text-align:right}
.hval{font-family:'Orbitron',monospace;font-size:20px;color:#fff;
  text-shadow:0 0 10px rgba(0,242,255,.55);letter-spacing:1px;line-height:1.1}
.hlbl{font-size:6px;letter-spacing:3px;color:rgba(0,242,255,.28);margin-top:2px}

/* ─── SCAN LINE OVERLAY ──────────────────────────── */
#scanlines{
  position:fixed;inset:0;pointer-events:none;z-index:5;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);
  mix-blend-mode:multiply
}

/* ─── VIGNETTE ───────────────────────────────────── */
#vignette{
  position:fixed;inset:0;pointer-events:none;z-index:6;
  background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 40%,rgba(0,0,0,.7) 100%)
}

/* ─── TOOLTIP ────────────────────────────────────── */
#tip{
  position:fixed;pointer-events:none;z-index:100;display:none;
  font-family:'Share Tech Mono',monospace;
  background:rgba(0,1,8,.96);
  border:1px solid rgba(0,242,255,.22);
  min-width:230px;max-width:265px;
  backdrop-filter:blur(10px);
  clip-path:polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px))
}
.tip-head{padding:14px 18px 12px;border-bottom:1px solid rgba(0,242,255,.08)}
.tip-accent-bar{height:2px;margin:-14px -18px 12px;
  box-shadow:0 0 10px currentColor}
.tip-name{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:2px;color:#fff}
.tip-body{padding:12px 18px 14px}
.tip-commits-num{font-family:'Orbitron',monospace;font-size:32px;letter-spacing:0px;line-height:1}
.tip-commits-lbl{font-size:7px;letter-spacing:3px;color:rgba(255,255,255,.3);margin-bottom:10px}
.tip-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;font-size:8px;letter-spacing:1.5px}
.tip-dot{width:8px;height:8px;border-radius:1px;flex-shrink:0}
.tip-desc{font-size:8px;color:rgba(255,255,255,.32);font-family:sans-serif;
  line-height:1.65;margin:8px 0;max-width:200px}
.tip-meta{font-size:8px;letter-spacing:1.5px;color:rgba(255,215,0,.55);margin-top:4px}
.tip-cta{
  font-size:7px;letter-spacing:2px;color:rgba(0,242,255,.3);
  margin-top:10px;padding-top:8px;border-top:1px solid rgba(0,242,255,.06)
}

/* ─── BOTTOM BAR ─────────────────────────────────── */
#bbar{
  position:fixed;bottom:0;left:0;right:0;height:32px;
  background:linear-gradient(0deg,rgba(0,0,0,.8) 0%,transparent 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:3px;
  color:rgba(0,242,255,.22);pointer-events:none;z-index:30
}

/* ─── CORNER DECO ────────────────────────────────── */
.corner{position:fixed;width:32px;height:32px;pointer-events:none;z-index:31}
.corner svg{width:100%;height:100%}
#c-tl{top:8px;left:8px}
#c-tr{top:8px;right:8px;transform:scaleX(-1)}
#c-bl{bottom:8px;left:8px;transform:scaleY(-1)}
#c-br{bottom:8px;right:8px;transform:scale(-1)}

@keyframes ldspin{to{transform:rotate(360deg)}}
@keyframes ldshim{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@keyframes blink{0%,100%{opacity:.9}50%{opacity:.3}}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
// ═══════════════════════════════════════════════
//  CURSOR — follows mouse directly, no delay
// ═══════════════════════════════════════════════
const cursorEl = document.getElementById('cursor');
let mx = window.innerWidth/2, my = window.innerHeight/2;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursorEl.style.left = mx + 'px';
  cursorEl.style.top  = my + 'px';
}, {passive: true});

// ═══════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════
const USERNAME = 'Jeevan9898';
const LANG_PAL = {
  JavaScript:'#f1e05a', Solidity:'#e4824a', Python:'#4584b6',
  HTML:'#e34c26', CSS:'#9b5fcb', TypeScript:'#3178c6',
  'C++':'#f34b7d', C:'#5a6baa', Rust:'#dea584', Go:'#00acd7',
  Java:'#b07219', PHP:'#4f5d95', Ruby:'#cc342d', Shell:'#89e051',
  default:'#00f2ff'
};

// ═══════════════════════════════════════════════
//  LOAD UI
// ═══════════════════════════════════════════════
function setLoad(p, m) {
  document.getElementById('ld-prog').style.width = p + '%';
  document.getElementById('ld-msg').textContent = m;
}

// ═══════════════════════════════════════════════
//  GITHUB API
// ═══════════════════════════════════════════════
async function getCommits(name) {
  try {
    const r = await fetch(
      `https://api.github.com/repos/${USERNAME}/${name}/commits?per_page=1`,
      {headers:{Accept:'application/vnd.github.v3+json'}}
    );
    const lk = r.headers.get('link') || '';
    const m = lk.match(/page=(\d+)>; rel="last"/);
    return m ? +m[1] : 1;
  } catch { return 1; }
}

async function fetchData() {
  setLoad(5, 'SCANNING DEEP SPACE...');
  const user = await fetch(`https://api.github.com/users/${USERNAME}`)
    .then(r => r.json()).catch(() => ({}));
  setLoad(15, 'DETECTING REPOSITORIES...');
  let repos = await fetch(
    `https://api.github.com/users/${USERNAME}/repos?per_page=100&sort=pushed`,
    {headers:{Accept:'application/vnd.github.v3+json'}}
  ).then(r => r.json()).catch(() => []);
  if (!Array.isArray(repos)) repos = [];

  const out = [];
  for (let i = 0; i < repos.length; i++) {
    const rp = repos[i];
    const c = await getCommits(rp.name);
    out.push({...rp, commitCount: c});
    setLoad(18 + (i+1)/repos.length*64, `MAPPING [${i+1}/${repos.length}] ${rp.name.toUpperCase()}`);
  }
  out.sort((a, b) => b.commitCount - a.commitCount);
  setLoad(84, 'CONSTRUCTING CITY GRID...');
  return {user, repos: out};
}

// ═══════════════════════════════════════════════
//  WINDOW TEXTURE — pixel crisp
// ═══════════════════════════════════════════════
function makeWinTex(color, cols, rows, density) {
  const S = 14, W = cols*S, H = rows*S;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#010914'; ctx.fillRect(0, 0, W, H);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (Math.random() < density) {
        ctx.globalAlpha = .38 + Math.random() * .55;
        ctx.fillStyle = Math.random() > .65 ? '#ffc84a' : color;
        ctx.fillRect(c*S+1, r*S+1, S-2, S-2);
        if (Math.random() > .6) {
          ctx.globalAlpha = .2;
          ctx.fillStyle = '#fff';
          ctx.fillRect(c*S+1, r*S+1, Math.floor(S/3), Math.floor(S/3));
        }
      }
    }
  }
  ctx.globalAlpha = 1;
  const t = new THREE.CanvasTexture(cv);
  t.magFilter = t.minFilter = THREE.NearestFilter;
  return t;
}

// ═══════════════════════════════════════════════
//  BUILD VOXEL SKYSCRAPER
// ═══════════════════════════════════════════════
function makeBuilding(scene, repo, cx, cz, maxC) {
  const color = LANG_PAL[repo.language] || LANG_PAL.default;
  const col3  = new THREE.Color(color);
  const logR  = Math.log(repo.commitCount + 1) / Math.log(maxC + 1);
  const floors = Math.max(4, Math.round(4 + logR * 72));
  const fw = Math.min(8, Math.max(3, 3 + Math.floor(Math.log((repo.stargazers_count||0)+2)/Math.log(3))));

  const grp = new THREE.Group();
  grp.position.set(cx, 0, cz);

  // tier setbacks — wider base, narrow top (real skyscraper feel)
  const tiers = [
    { yStart: 0,                      yEnd: Math.floor(floors*.5),  w: fw   },
    { yStart: Math.floor(floors*.5),  yEnd: Math.floor(floors*.78), w: Math.max(2, fw-1) },
    { yStart: Math.floor(floors*.78), yEnd: floors,                 w: Math.max(2, fw-2) },
  ];

  tiers.forEach(({yStart, yEnd, w}) => {
    if (yStart >= yEnd) return;
    const h = yEnd - yStart;
    const d = .28 + logR*.38 + (yStart/floors)*.18;
    const wt = makeWinTex(color, w*2, h*2, d);

    const sideMat = new THREE.MeshLambertMaterial({
      color: col3.clone().multiplyScalar(.12),
      map: wt, emissiveMap: wt,
      emissive: col3.clone(), emissiveIntensity: .45 + logR*.4,
    });
    const topMat  = new THREE.MeshLambertMaterial({color: 0x030a18});
    const botMat  = new THREE.MeshLambertMaterial({color: 0x010608});
    const mats = [sideMat, sideMat, topMat, botMat, sideMat, sideMat];

    const geo  = new THREE.BoxGeometry(w, h, w);
    const mesh = new THREE.Mesh(geo, mats);
    mesh.position.set(0, yStart + h/2, 0);
    mesh.castShadow = mesh.receiveShadow = true;
    grp.add(mesh);

    // edge glow outline
    const eMat = new THREE.LineBasicMaterial({
      color: col3.clone().multiplyScalar(1.8),
      transparent: true, opacity: .3
    });
    const eLine = new THREE.LineSegments(new THREE.EdgesGeometry(geo), eMat);
    eLine.position.copy(mesh.position);
    grp.add(eLine);
  });

  const topY = floors;
  const capW = Math.max(1, fw-2);

  // roof glow cap
  const capGeo = new THREE.BoxGeometry(capW+.08, .14, capW+.08);
  const capMat = new THREE.MeshBasicMaterial({color: col3, transparent: true, opacity: .85});
  const cap = new THREE.Mesh(capGeo, capMat);
  cap.position.y = topY + .07;
  grp.add(cap);

  // roof halo spread
  const haloGeo = new THREE.BoxGeometry(capW+1.2, .04, capW+1.2);
  const haloMat = new THREE.MeshBasicMaterial({color: col3, transparent: true, opacity: .15});
  const halo = new THREE.Mesh(haloGeo, haloMat);
  halo.position.y = topY + .02;
  grp.add(halo);

  // spire on tall buildings
  if (floors > 20) {
    const spH = Math.floor(floors * .18);
    const spGeo = new THREE.CylinderGeometry(.05, .14, spH, 6);
    const spMat = new THREE.MeshLambertMaterial({color: 0x112233});
    const sp = new THREE.Mesh(spGeo, spMat);
    sp.position.y = topY + spH/2;
    grp.add(sp);

    // blinking beacon cube (pixel style)
    const bGeo = new THREE.BoxGeometry(.4, .4, .4);
    const bMat = new THREE.MeshBasicMaterial({color: col3});
    const beacon = new THREE.Mesh(bGeo, bMat);
    beacon.position.y = topY + spH + .3;
    beacon.userData._beacon = {mat: bMat, col: col3.clone()};
    grp.add(beacon);
  }

  // rooftop point light
  const pl = new THREE.PointLight(col3, .65 + logR * .7, floors * 3, 2);
  pl.position.y = topY + 1.5;
  grp.add(pl);

  grp.userData = {...repo, _color: color, _isBuilding: true};
  scene.add(grp);
  return grp;
}

// ═══════════════════════════════════════════════
//  SPACE ENVIRONMENT
// ═══════════════════════════════════════════════
function buildSpace(scene) {

  // ── MULTI-LAYER STAR FIELD ──────────────────
  const starLayers = [
    {n:7000, rMin:380, rMax:650, size:1.0, op:.92},
    {n:2500, rMin:200, rMax:380, size:1.5, op:.75},
    {n:600,  rMin:100, rMax:200, size:2.0, op:.55},
  ];
  const starObjs = [];
  starLayers.forEach(l => {
    const pos = new Float32Array(l.n * 3);
    for (let i = 0; i < l.n; i++) {
      const th = Math.random() * Math.PI * 2;
      const ph = Math.acos(2 * Math.random() - 1);
      const r  = l.rMin + Math.random() * (l.rMax - l.rMin);
      pos[i*3]   = r * Math.sin(ph) * Math.cos(th);
      pos[i*3+1] = Math.abs(r * Math.cos(ph)) + 5;
      pos[i*3+2] = r * Math.sin(ph) * Math.sin(th);
    }
    const cv  = document.createElement('canvas'); cv.width = cv.height = 16;
    const ctx = cv.getContext('2d');
    const g   = ctx.createRadialGradient(8,8,0,8,8,8);
    g.addColorStop(0,   'rgba(255,255,255,1)');
    g.addColorStop(.35, 'rgba(210,230,255,.85)');
    g.addColorStop(1,   'transparent');
    ctx.fillStyle = g; ctx.fillRect(0,0,16,16);

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    const mat = new THREE.PointsMaterial({
      map: new THREE.CanvasTexture(cv), size: l.size, sizeAttenuation: true,
      transparent: true, opacity: l.op,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const pts = new THREE.Points(geo, mat);
    pts.userData._star = true;
    scene.add(pts);
    starObjs.push(pts);
  });

  // ── NEBULA GAS CLOUDS ───────────────────────
  [
    {p:[ 60,130,-300], s:[310,140], c:'rgba(0,70,200,.06)'},
    {p:[-120,170,-350],s:[240,110], c:'rgba(100,0,200,.045)'},
    {p:[ 200,100,-260],s:[200,90],  c:'rgba(0,150,120,.04)'},
    {p:[-200,200,-380],s:[340,130], c:'rgba(180,0,100,.035)'},
    {p:[  10, 80,-220],s:[380,100], c:'rgba(0,90,180,.04)'},
    {p:[ 300,160,-300],s:[200,80],  c:'rgba(60,0,180,.03)'},
  ].forEach(n => {
    const cv = document.createElement('canvas'); cv.width=256; cv.height=128;
    const ctx = cv.getContext('2d');
    const g = ctx.createRadialGradient(128,64,0,128,64,128);
    g.addColorStop(0, n.c);
    g.addColorStop(.65, n.c.replace(/[\d.]+\)$/, '0.008)'));
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g; ctx.fillRect(0,0,256,128);
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({
      map: new THREE.CanvasTexture(cv), transparent: true,
      depthWrite: false, blending: THREE.AdditiveBlending,
    }));
    sp.position.set(...n.p);
    sp.scale.set(...n.s, 1);
    scene.add(sp);
  });

  // ── MOON ────────────────────────────────────
  const mCv = document.createElement('canvas'); mCv.width = mCv.height = 256;
  const mCtx = mCv.getContext('2d');
  const mG = mCtx.createRadialGradient(128,128,0,128,128,128);
  mG.addColorStop(0,   '#f8f0d8');
  mG.addColorStop(.7,  '#e8d8b8');
  mG.addColorStop(1,   '#d0c090');
  mCtx.fillStyle = mG; mCtx.beginPath(); mCtx.arc(128,128,128,0,Math.PI*2); mCtx.fill();
  [[75,80,18],[155,65,13],[55,165,9],[185,155,15],[120,125,7],[200,100,6]].forEach(([x,y,r]) => {
    const cg = mCtx.createRadialGradient(x,y,0,x,y,r);
    cg.addColorStop(0, 'rgba(0,0,0,.22)'); cg.addColorStop(1, 'transparent');
    mCtx.fillStyle = cg; mCtx.beginPath(); mCtx.arc(x,y,r,0,Math.PI*2); mCtx.fill();
  });
  const moonMesh = new THREE.Mesh(
    new THREE.SphereGeometry(22, 32, 32),
    new THREE.MeshBasicMaterial({map: new THREE.CanvasTexture(mCv)})
  );
  moonMesh.position.set(200, 230, -380);
  scene.add(moonMesh);

  // moon glow halo
  const mhCv = document.createElement('canvas'); mhCv.width = mhCv.height = 128;
  const mhCtx = mhCv.getContext('2d');
  const mhG = mhCtx.createRadialGradient(64,64,0,64,64,64);
  mhG.addColorStop(0,   'rgba(240,230,190,.28)');
  mhG.addColorStop(.4,  'rgba(200,215,255,.07)');
  mhG.addColorStop(1,   'transparent');
  mhCtx.fillStyle = mhG; mhCtx.fillRect(0,0,128,128);
  const mhSp = new THREE.Sprite(new THREE.SpriteMaterial({
    map: new THREE.CanvasTexture(mhCv), transparent: true,
    depthWrite: false, blending: THREE.AdditiveBlending,
  }));
  mhSp.position.copy(moonMesh.position);
  mhSp.scale.set(170, 170, 1);
  scene.add(mhSp);

  // ── SHOOTING STARS ──────────────────────────
  const TRAIL = 32;
  const shooters = [];

  function spawnShooter() {
    const sx=(Math.random()-.5)*700, sy=80+Math.random()*200, sz=(Math.random()-.5)*700;
    const ang=Math.random()*Math.PI*2, spd=6+Math.random()*10;
    const trail = Array.from({length: TRAIL}, ()=>({x:sx,y:sy,z:sz}));
    const pos = new Float32Array(TRAIL*3);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const col = Math.random()>.4 ? 0xffffff : 0x88ccff;
    const mat = new THREE.LineBasicMaterial({color:col,transparent:true,opacity:.9,blending:THREE.AdditiveBlending,depthWrite:false});
    const line = new THREE.Line(geo, mat); scene.add(line);
    const hMat = new THREE.MeshBasicMaterial({color:col,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false});
    const head = new THREE.Mesh(new THREE.SphereGeometry(.7,4,4), hMat);
    head.position.set(sx,sy,sz); scene.add(head);
    return {
      line, head, geo, mat, hMat, trail,
      x:sx, y:sy, z:sz,
      vx:Math.cos(ang)*spd, vy:-(0.3+Math.random()*.7), vz:Math.sin(ang)*spd,
      life:0, maxLife:50+Math.random()*80,
    };
  }

  for (let i=0; i<5; i++) {
    const s = spawnShooter(); s.life = Math.random()*s.maxLife; shooters.push(s);
  }

  // ── DISTANT SKYLINE ─────────────────────────
  for (let i = 0; i < 36; i++) {
    const ang = (i/36)*Math.PI*2;
    const d   = 185 + Math.random()*35;
    const h   = 3 + Math.random()*30;
    const w   = 2 + Math.random()*7;
    const m   = new THREE.Mesh(
      new THREE.BoxGeometry(w, h, .5),
      new THREE.MeshBasicMaterial({color: 0x00090c})
    );
    m.position.set(Math.cos(ang)*d, h/2, Math.sin(ang)*d);
    scene.add(m);
  }

  // ── GROUND ──────────────────────────────────
  // Smooth, dark, no grid pixels
  const gCv = document.createElement('canvas'); gCv.width = gCv.height = 512;
  const gCtx = gCv.getContext('2d');
  gCtx.fillStyle = '#00040c'; gCtx.fillRect(0,0,512,512);
  // barely-visible hex-grid
  gCtx.strokeStyle='rgba(0,80,160,.04)'; gCtx.lineWidth=.6;
  for (let i=0;i<512;i+=32) {
    gCtx.beginPath();gCtx.moveTo(i,0);gCtx.lineTo(i,512);gCtx.stroke();
    gCtx.beginPath();gCtx.moveTo(0,i);gCtx.lineTo(512,i);gCtx.stroke();
  }
  const gTex = new THREE.CanvasTexture(gCv);
  gTex.wrapS = gTex.wrapT = THREE.RepeatWrapping; gTex.repeat.set(14,14);
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(700, 700, 1, 1),
    new THREE.MeshLambertMaterial({color: 0x00040c, map: gTex})
  );
  ground.rotation.x = -Math.PI/2; ground.position.y = -.02;
  ground.receiveShadow = true; scene.add(ground);

  // thin neon road lines
  const lm = new THREE.LineBasicMaterial({color:0x002850, transparent:true, opacity:.25});
  [-5, 5].forEach(o => {
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(
      [new THREE.Vector3(o, 0,-350), new THREE.Vector3(o, 0, 350)]), lm));
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(
      [new THREE.Vector3(-350, 0, o), new THREE.Vector3(350, 0, o)]), lm));
  });

  // ── UPDATE FN ───────────────────────────────
  let frame = 0;
  function updateSpace() {
    frame++;
    // slowly drift stars
    starObjs.forEach((s,i) => { s.rotation.y += 0.00003 * (i+1); });
    // starfield twinkle
    if (frame % 3 === 0) {
      starObjs.forEach(s => {
        s.material.opacity = s.material.opacity * .98 + (Math.random() * .1 + .82) * .02;
      });
    }
    // update shooters
    if (Math.random() < .007 && shooters.filter(s=>!s._dead).length < 8)
      shooters.push(spawnShooter());
    for (let i = shooters.length-1; i >= 0; i--) {
      const s = shooters[i]; if (s._dead) continue;
      s.life++; s.x+=s.vx; s.y+=s.vy; s.z+=s.vz;
      s.head.position.set(s.x,s.y,s.z);
      s.trail.unshift({x:s.x,y:s.y,z:s.z});
      if (s.trail.length > TRAIL) s.trail.pop();
      const pa = s.geo.attributes.position.array;
      s.trail.forEach((p,pi)=>{ pa[pi*3]=p.x; pa[pi*3+1]=p.y; pa[pi*3+2]=p.z; });
      s.geo.attributes.position.needsUpdate = true;
      const t = s.life/s.maxLife;
      const a = t<.15?t/.15 : t>.72?(1-t)/.28 : 1;
      s.mat.opacity = .88*a; s.hMat.opacity = a;
      if (s.life >= s.maxLife) {
        scene.remove(s.line); scene.remove(s.head);
        s._dead = true; shooters.splice(i,1);
      }
    }
  }
  return {updateSpace};
}

// ═══════════════════════════════════════════════
//  TOOLTIP
// ═══════════════════════════════════════════════
const tip = document.getElementById('tip');
let hoveredGroup = null;

function showTip(r, x, y) {
  const sc = r._color || '#00f2ff';
  document.getElementById('tip-bar').style.cssText =
    `background:${sc};box-shadow:0 0 12px ${sc},0 0 24px ${sc}50;`;
  document.getElementById('tip-name').textContent = r.name.toUpperCase();
  document.getElementById('tip-name').style.textShadow = `0 0 8px ${sc}60`;
  document.getElementById('tip-commits').textContent = r.commitCount.toLocaleString();
  document.getElementById('tip-commits').style.cssText =
    `color:${sc};text-shadow:0 0 18px ${sc};font-family:Orbitron,monospace;font-size:32px;line-height:1;letter-spacing:0`;
  document.getElementById('tip-dot').style.cssText =
    `background:${sc};box-shadow:0 0 6px ${sc};width:8px;height:8px;border-radius:1px;flex-shrink:0`;
  document.getElementById('tip-lang').textContent = (r.language||'UNKNOWN').toUpperCase();
  document.getElementById('tip-lang').style.color = sc;
  document.getElementById('tip-desc').textContent = r.description || 'No description.';
  document.getElementById('tip-meta').textContent =
    `★ ${r.stargazers_count||0} STARS  ·  ⑂ ${r.forks_count||0} FORKS`;
  tip.style.borderColor = sc + '30';
  tip.style.display = 'block';
  moveTip(x, y);
  cursorEl.classList.add('hover');
}
function moveTip(x, y) {
  const pw = tip.offsetWidth||240, ph = tip.offsetHeight||220, pad=18;
  const tx = x + 24 + pw > window.innerWidth-pad ? x - pw - 14 : x + 24;
  const ty = Math.max(pad, Math.min(y - 16, window.innerHeight - ph - pad));
  tip.style.left = tx + 'px'; tip.style.top = ty + 'px';
}
function hideTip() {
  tip.style.display = 'none';
  hoveredGroup = null;
  cursorEl.classList.remove('hover');
}

// ═══════════════════════════════════════════════
//  MAIN
// ═══════════════════════════════════════════════
async function main() {
  let repos=[], user={};
  try { ({user, repos} = await fetchData()); }
  catch(e) { setLoad(84,'API ERROR'); console.error(e); }

  const totC = repos.reduce((s,r)=>s+r.commitCount,0);
  const totS = repos.reduce((s,r)=>s+(r.stargazers_count||0),0);
  document.getElementById('hv-b').textContent = repos.length;
  document.getElementById('hv-c').textContent = totC.toLocaleString();
  document.getElementById('hv-s').textContent = totS;

  setLoad(90,'WARMING UP ENGINES...');

  // ── THREE SETUP ─────────────────────────────
  const canvas   = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({canvas, antialias:true, powerPreference:'high-performance'});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.15;

  const scene  = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);
  scene.fog = new THREE.FogExp2(0x000000, .007);

  const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, .1, 1200);

  // ── LIGHTS ──────────────────────────────────
  scene.add(new THREE.AmbientLight(0x010510, 1.6));
  scene.add(new THREE.HemisphereLight(0x000e20, 0x000000, .5));
  const dl = new THREE.DirectionalLight(0x334455, .45);
  dl.position.set(4, 12, -8); dl.castShadow = true;
  dl.shadow.mapSize.set(1024,1024); scene.add(dl);

  // ── ENVIRONMENT + CITY ──────────────────────
  const {updateSpace} = buildSpace(scene);

  const maxC = Math.max(...repos.map(r=>r.commitCount), 1);
  const COLS  = Math.ceil(Math.sqrt(repos.length));
  const SP    = 17;
  const groups = [];
  repos.forEach((repo, i) => {
    const col = i % COLS;
    const row = Math.floor(i / COLS);
    const cx  = (col - (COLS-1)/2) * SP;
    const cz  = (row - (Math.ceil(repos.length/COLS)-1)/2) * SP;
    groups.push(makeBuilding(scene, repo, cx, cz, maxC));
  });

  setLoad(100,'ENTERING GIT CITY');
  setTimeout(() => {
    const ld = document.getElementById('loader');
    ld.style.opacity = '0';
    setTimeout(() => ld.style.display = 'none', 1000);
  }, 500);

  // ── ORBIT CAMERA STATE ──────────────────────
  let theta    = 0.4;       // azimuth
  let phi      = 0.88;      // polar (clamped)
  let radius   = 110;       // distance
  let tTheta   = theta, tPhi = phi, tRadius = radius;
  let autoRot  = true;
  let isDrag   = false;
  let dragX    = 0, dragY   = 0;

  function setCam() {
    camera.position.x = radius * Math.sin(phi) * Math.cos(theta);
    camera.position.y = radius * Math.cos(phi);
    camera.position.z = radius * Math.sin(phi) * Math.sin(theta);
    camera.lookAt(0, 8, 0);
  }
  setCam();

  // MOUSE DRAG ORBIT
  canvas.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    isDrag = true; autoRot = false;
    dragX = e.clientX; dragY = e.clientY;
    canvas.style.cursor = 'none';
  });
  window.addEventListener('mouseup', () => { isDrag = false; });
  window.addEventListener('mousemove', e => {
    if (!isDrag) return;
    const dx = e.clientX - dragX;
    const dy = e.clientY - dragY;
    tTheta -= dx * .008;
    tPhi    = Math.max(.12, Math.min(1.48, tPhi - dy * .006));
    dragX = e.clientX; dragY = e.clientY;
  });

  // SCROLL ZOOM
  canvas.addEventListener('wheel', e => {
    tRadius = Math.max(18, Math.min(200, tRadius + e.deltaY * .12));
    e.preventDefault();
  }, {passive: false});

  // TOUCH ORBIT + PINCH ZOOM
  let lastTouchX=0, lastTouchY=0, lastPinchD=0, touchDrag=false;
  canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      touchDrag=true; autoRot=false;
      lastTouchX=e.touches[0].clientX; lastTouchY=e.touches[0].clientY;
    }
    if (e.touches.length === 2)
      lastPinchD = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
  }, {passive:true});
  canvas.addEventListener('touchmove', e => {
    if (e.touches.length === 1 && touchDrag) {
      tTheta -= (e.touches[0].clientX - lastTouchX) * .01;
      tPhi    = Math.max(.12, Math.min(1.48, tPhi - (e.touches[0].clientY - lastTouchY) * .008));
      lastTouchX=e.touches[0].clientX; lastTouchY=e.touches[0].clientY;
    }
    if (e.touches.length === 2) {
      const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
      tRadius = Math.max(18, Math.min(200, tRadius - (d-lastPinchD)*.28));
      lastPinchD = d;
    }
  }, {passive:true});
  canvas.addEventListener('touchend', () => touchDrag=false, {passive:true});

  // ── RAYCASTER / HOVER ───────────────────────
  const raycaster = new THREE.Raycaster();
  let allMeshes = [];
  groups.forEach(g => g.traverse(c => { if (c.isMesh && !c.userData._beacon) allMeshes.push(c); }));

  canvas.addEventListener('mousemove', e => {
    if (isDrag) return;
    const nx = (e.clientX/window.innerWidth)*2 - 1;
    const ny = -(e.clientY/window.innerHeight)*2 + 1;
    raycaster.setFromCamera(new THREE.Vector2(nx,ny), camera);
    const hits = raycaster.intersectObjects(allMeshes);
    if (hits.length) {
      let g = hits[0].object;
      while (g && !g.userData._isBuilding) g = g.parent;
      if (!g) return;
      if (g !== hoveredGroup) { hoveredGroup = g; showTip(g.userData, e.clientX, e.clientY); }
      else moveTip(e.clientX, e.clientY);
    } else { hideTip(); }
  });

  canvas.addEventListener('click', e => {
    if (hoveredGroup && hoveredGroup.userData.html_url)
      window.open(hoveredGroup.userData.html_url, '_blank');
  });

  // RESIZE
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ── ANIMATE ─────────────────────────────────
  let frame = 0;
  function animate() {
    requestAnimationFrame(animate);
    frame++;

    // auto rotate
    if (autoRot) tTheta += .0018;

    // smooth camera easing
    theta  += (tTheta  - theta)  * .055;
    phi    += (tPhi    - phi)    * .055;
    radius += (tRadius - radius) * .055;
    setCam();

    // beacon blink
    scene.traverse(o => {
      if (o.userData._beacon) {
        const {mat, col} = o.userData._beacon;
        const t = Math.sin(frame*.09 + o.id*.7) * .5 + .5;
        mat.color.lerpColors(col, new THREE.Color(1,1,1), t*.45);
      }
    });

    updateSpace();
    renderer.render(scene, camera);
  }
  animate();
}

main().catch(e => {
  console.error(e);
  document.getElementById('ld-msg').textContent = 'ERROR: ' + e.message;
});
</script>
</body>
