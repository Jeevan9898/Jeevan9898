<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000308;overflow:hidden;font-family:'Share Tech Mono','Courier New',monospace;color:#00f2ff}
#c{display:block;width:100vw;height:100vh}

/* LOADER */
#loader{position:fixed;inset:0;background:#000308;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:200;gap:20px;
  transition:opacity .8s}
#loader-glow{
  width:160px;height:160px;position:relative;display:flex;align-items:center;justify-content:center}
#loader-ring{
  position:absolute;inset:0;border:1px solid rgba(0,242,255,.15);border-radius:50%;
  animation:spin 4s linear infinite}
#loader-ring2{
  position:absolute;inset:12px;border:1px solid rgba(0,242,255,.08);border-radius:50%;
  animation:spin 6s linear infinite reverse}
#loader-icon{font-size:36px;text-shadow:0 0 30px #00f2ff;animation:pulse 2s ease-in-out infinite}
#loader h1{font-size:16px;letter-spacing:8px;text-shadow:0 0 20px #00f2ff;text-align:center}
#bar-wrap{width:260px;height:2px;background:#040f1a;position:relative}
#bar-wrap::before{content:'';position:absolute;top:-4px;left:0;right:0;height:10px;
  background:linear-gradient(90deg,transparent,rgba(0,242,255,.05),transparent)}
#bar{height:100%;background:linear-gradient(90deg,#003a4f,#00f2ff);width:0%;
  transition:width .4s;box-shadow:0 0 12px #00f2ff,0 0 30px rgba(0,242,255,.3)}
#load-msg{font-size:9px;letter-spacing:4px;color:rgba(0,242,255,.4);min-height:16px;text-align:center}

/* HUD TOP */
#hud{position:fixed;top:0;left:0;right:0;padding:16px 24px;
  display:flex;justify-content:space-between;align-items:flex-start;
  background:linear-gradient(180deg,rgba(0,3,8,.9) 0%,transparent 100%);
  pointer-events:none;z-index:10}
#hud-left{}
#hud-title{font-size:14px;letter-spacing:6px;text-shadow:0 0 16px #00f2ff,0 0 40px rgba(0,242,255,.2);
  margin-bottom:4px}
#hud-sub{font-size:8px;letter-spacing:3px;color:rgba(0,242,255,.35)}
#hud-right{display:flex;gap:24px}
.hud-stat{text-align:right}
.hud-stat-val{font-size:22px;color:#fff;text-shadow:0 0 12px rgba(0,242,255,.5);letter-spacing:2px;line-height:1}
.hud-stat-label{font-size:7px;letter-spacing:3px;color:rgba(0,242,255,.35);margin-top:2px}

/* TOOLTIP */
#tip{position:fixed;pointer-events:none;z-index:20;display:none;
  background:rgba(0,3,8,.96);border:1px solid rgba(0,242,255,.3);
  padding:16px 20px;min-width:240px;backdrop-filter:blur(4px)}
#tip-bar{position:absolute;top:0;left:0;right:0;height:2px;background:#00f2ff;
  box-shadow:0 0 8px #00f2ff}
#tip-name{font-size:13px;letter-spacing:3px;color:#fff;margin-bottom:10px}
#tip-big{display:flex;align-items:baseline;gap:6px;margin-bottom:3px}
#tip-commits{font-size:28px;color:#00f2ff;text-shadow:0 0 14px #00f2ff;letter-spacing:1px;line-height:1}
#tip-commits-label{font-size:8px;color:rgba(0,242,255,.4);letter-spacing:2px}
#tip-divider{height:1px;background:rgba(0,242,255,.1);margin:10px 0}
#tip-lang{font-size:9px;letter-spacing:2px;margin-bottom:5px}
#tip-desc{font-size:8px;color:rgba(255,255,255,.4);letter-spacing:.5px;line-height:1.7;
  margin-bottom:8px;font-family:sans-serif;max-width:200px}
#tip-meta{font-size:8px;letter-spacing:2px;color:rgba(255,215,0,.6)}
#tip-cta{font-size:7px;color:rgba(0,242,255,.35);letter-spacing:2px;
  margin-top:10px;padding-top:8px;border-top:1px solid rgba(0,242,255,.08)}
.tip-corner{position:absolute;width:5px;height:5px}
.tip-corner.tl{top:-1px;left:-1px;border-top:2px solid;border-left:2px solid}
.tip-corner.tr{top:-1px;right:-1px;border-top:2px solid;border-right:2px solid}
.tip-corner.bl{bottom:-1px;left:-1px;border-bottom:2px solid;border-left:2px solid}
.tip-corner.br{bottom:-1px;right:-1px;border-bottom:2px solid;border-right:2px solid}

/* LEGEND */
#legend{position:fixed;bottom:24px;left:24px;z-index:10;
  background:rgba(0,3,8,.85);border:1px solid rgba(0,242,255,.1);
  padding:14px 18px;display:none;backdrop-filter:blur(4px)}
#legend h3{font-size:7px;letter-spacing:4px;color:rgba(0,242,255,.35);margin-bottom:10px}
.leg-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:8px;letter-spacing:2px;cursor:pointer}
.leg-swatch{width:10px;height:10px;flex-shrink:0;position:relative}
.leg-swatch::after{content:'';position:absolute;inset:-3px;opacity:.3}

/* BOTTOM TICKER */
#ticker{position:fixed;bottom:0;left:0;right:0;height:28px;overflow:hidden;
  background:rgba(0,3,8,.9);border-top:1px solid rgba(0,242,255,.08);
  display:none;align-items:center;z-index:10}
#ticker-inner{white-space:nowrap;font-size:8px;letter-spacing:3px;
  color:rgba(0,242,255,.25);animation:ticker 40s linear infinite}

/* CONTROLS */
#controls{position:fixed;bottom:36px;right:24px;z-index:10;
  font-size:7px;letter-spacing:2px;color:rgba(0,242,255,.2);text-align:right;line-height:2.2}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
@keyframes ticker{0%{transform:translateX(100vw)}100%{transform:translateX(-100%)}}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════
const USERNAME = 'Jeevan9898';

const LANG_COLORS = {
  JavaScript:'#f1e05a', Solidity:'#e4824a', Python:'#3572A5',
  HTML:'#e34c26', CSS:'#7659a8', TypeScript:'#3178c6',
  'C++':'#f34b7d', C:'#555599', Rust:'#dea584', Go:'#00acd7',
  Java:'#b07219', PHP:'#4f5d95', Ruby:'#cc342d', Shell:'#89e051',
  Vue:'#41b883', Swift:'#F05138', Kotlin:'#A97BFF',
  default:'#00f2ff'
};

// ═══════════════════════════════════════════════════════
//  LOAD UI
// ═══════════════════════════════════════════════════════
function setLoad(pct, msg){
  document.getElementById('bar').style.width = pct + '%';
  document.getElementById('load-msg').textContent = msg;
}

// ═══════════════════════════════════════════════════════
//  GITHUB FETCH
// ═══════════════════════════════════════════════════════
async function getCommitCount(repo){
  try{
    const r = await fetch(
      `https://api.github.com/repos/${USERNAME}/${repo}/commits?per_page=1`,
      {headers:{Accept:'application/vnd.github.v3+json'}}
    );
    const link = r.headers.get('link') || '';
    const m = link.match(/page=(\d+)>; rel="last"/);
    return m ? parseInt(m[1]) : 1;
  } catch(e){ return 1; }
}

async function fetchGitHub(){
  setLoad(5, 'CONNECTING TO GITHUB API...');
  const user = await fetch(`https://api.github.com/users/${USERNAME}`)
    .then(r=>r.json()).catch(()=>({}));

  setLoad(18, 'SCANNING REPOSITORIES...');
  let repos = await fetch(
    `https://api.github.com/users/${USERNAME}/repos?per_page=100&sort=pushed`,
    {headers:{Accept:'application/vnd.github.v3+json'}}
  ).then(r=>r.json()).catch(()=>[]);

  if(!Array.isArray(repos)) repos = [];
  repos = repos.filter(r=>!r.archived && !r.fork || r.stargazers_count>0);

  setLoad(30, 'MEASURING COMMIT HEIGHTS...');
  const enriched = [];
  for(let i=0;i<repos.length;i++){
    const repo = repos[i];
    const commits = await getCommitCount(repo.name);
    enriched.push({...repo, commitCount: commits});
    const pct = 30 + ((i+1)/repos.length)*55;
    setLoad(pct, `SCANNING: ${repo.name.toUpperCase()} [${i+1}/${repos.length}]`);
  }

  // sort by commits descending — tallest buildings get prime spots
  enriched.sort((a,b)=>b.commitCount - a.commitCount);
  setLoad(88, 'CONSTRUCTING SKYSCRAPERS...');
  return {user, repos: enriched};
}

// ═══════════════════════════════════════════════════════
//  WINDOW TEXTURE
// ═══════════════════════════════════════════════════════
function makeWindowTex(color, rows=20, cols=4, density=0.62){
  const W=128, H=512;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#010810'; ctx.fillRect(0,0,W,H);
  const cw=W/cols, ch=H/rows;
  const c3=new THREE.Color(color);
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      if(Math.random()<density){
        const alpha=0.3+Math.random()*0.6;
        // slight warmth variation
        const warm = Math.random()>.7 ? '#ffe8a0' : color;
        ctx.globalAlpha=alpha;
        ctx.fillStyle=warm;
        ctx.fillRect(c*cw+2, r*ch+2, cw-4, ch-4);
        // window reflection glint
        if(Math.random()>.6){
          ctx.globalAlpha=alpha*.4;
          ctx.fillStyle='#ffffff';
          ctx.fillRect(c*cw+2, r*ch+2, 3, 3);
        }
      }
    }
  }
  ctx.globalAlpha=1;
  return new THREE.CanvasTexture(cv);
}

// ═══════════════════════════════════════════════════════
//  LABEL SPRITE
// ═══════════════════════════════════════════════════════
function makeLabel(name, commits, color){
  const W=340, H=90;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');
  // bg
  ctx.fillStyle='rgba(0,4,14,0.88)'; ctx.fillRect(0,0,W,H);
  // top accent
  ctx.fillStyle=color; ctx.fillRect(0,0,W,2);
  // corner dots
  [[0,0],[W-6,0],[0,H-6],[W-6,H-6]].forEach(([x,y])=>{
    ctx.fillStyle=color; ctx.fillRect(x,y,6,6);
  });
  // name
  ctx.font='bold 16px monospace'; ctx.fillStyle='#ffffff';
  ctx.textAlign='center';
  ctx.shadowColor=color; ctx.shadowBlur=8;
  ctx.fillText(name, W/2, 28);
  // commits
  ctx.font='12px monospace'; ctx.fillStyle=color;
  ctx.shadowBlur=12;
  ctx.fillText(commits.toLocaleString()+' COMMITS', W/2, 52);
  ctx.shadowBlur=0;
  // bar
  ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(20,62); ctx.lineTo(W-20,62); ctx.stroke();

  const tex=new THREE.CanvasTexture(cv);
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false,sizeAttenuation:true});
  const sp=new THREE.Sprite(mat);
  sp.scale.set(14,3.5,1);
  return sp;
}

// ═══════════════════════════════════════════════════════
//  BUILD SKYSCRAPERS
// ═══════════════════════════════════════════════════════
function buildCity(scene, repos){
  const maxC = Math.max(...repos.map(r=>r.commitCount), 1);
  const COLS = Math.ceil(Math.sqrt(repos.length));
  const SPACING = 11;
  const MAX_H = 120;   // tallest possible skyscraper
  const MIN_H = 8;     // shortest building

  const meshes = [];

  repos.forEach((repo, i)=>{
    const col = i % COLS;
    const row = Math.floor(i / COLS);
    const cx = (col - (COLS-1)/2) * SPACING;
    const cz = (row - (Math.ceil(repos.length/COLS)-1)/2) * SPACING;

    // height based on commits (log scale for dramatic effect)
    const logScale = Math.log(repo.commitCount+1) / Math.log(maxC+1);
    const H = MIN_H + logScale * (MAX_H - MIN_H);

    const color = LANG_COLORS[repo.language] || LANG_COLORS.default;
    const colObj = new THREE.Color(color);

    // ── SKYSCRAPER GEOMETRY: setbacks at different heights
    const group = new THREE.Group();
    group.position.set(cx, 0, cz);

    // base block (wide)
    const baseW = 4.0, baseH = H * 0.45;
    const baseTex = makeWindowTex(color, Math.floor(baseH*2), 4, 0.60);
    const baseMats = [
      new THREE.MeshStandardMaterial({color:0x050d18, map:baseTex, emissiveMap:baseTex, emissive:colObj.clone().multiplyScalar(0.3), emissiveIntensity:0.7, roughness:0.25, metalness:0.6}),
      new THREE.MeshStandardMaterial({color:0x050d18, map:baseTex, emissiveMap:baseTex, emissive:colObj.clone().multiplyScalar(0.3), emissiveIntensity:0.7, roughness:0.25, metalness:0.6}),
      new THREE.MeshStandardMaterial({color:0x080f1a, roughness:0.4, metalness:0.7}),
      new THREE.MeshStandardMaterial({color:0x020810}),
      new THREE.MeshStandardMaterial({color:0x050d18, map:baseTex, emissiveMap:baseTex, emissive:colObj.clone().multiplyScalar(0.3), emissiveIntensity:0.7, roughness:0.25, metalness:0.6}),
      new THREE.MeshStandardMaterial({color:0x050d18, map:baseTex, emissiveMap:baseTex, emissive:colObj.clone().multiplyScalar(0.3), emissiveIntensity:0.7, roughness:0.25, metalness:0.6}),
    ];
    const baseGeo = new THREE.BoxGeometry(baseW, baseH, baseW);
    const baseMesh = new THREE.Mesh(baseGeo, baseMats);
    baseMesh.position.y = baseH/2;
    baseMesh.castShadow = true; baseMesh.receiveShadow = true;
    group.add(baseMesh);

    // setback 1 (slightly narrower)
    const s1W = baseW * 0.78, s1H = H * 0.32;
    const s1Tex = makeWindowTex(color, Math.floor(s1H*2), 3, 0.58);
    const s1Mat = new THREE.MeshStandardMaterial({color:0x040c16, map:s1Tex, emissiveMap:s1Tex, emissive:colObj.clone().multiplyScalar(0.35), emissiveIntensity:0.75, roughness:0.2, metalness:0.65});
    const s1Geo = new THREE.BoxGeometry(s1W, s1H, s1W);
    const s1Mesh = new THREE.Mesh(s1Geo, s1Mat);
    s1Mesh.position.y = baseH + s1H/2;
    s1Mesh.castShadow = true;
    group.add(s1Mesh);

    // setback 2 (tower, narrow)
    if(H > 25){
      const s2W = s1W * 0.65, s2H = H * 0.23;
      const s2Tex = makeWindowTex(color, Math.floor(s2H*2), 2, 0.55);
      const s2Mat = new THREE.MeshStandardMaterial({color:0x030b14, map:s2Tex, emissiveMap:s2Tex, emissive:colObj.clone().multiplyScalar(0.4), emissiveIntensity:0.85, roughness:0.18, metalness:0.7});
      const s2Geo = new THREE.BoxGeometry(s2W, s2H, s2W);
      const s2Mesh = new THREE.Mesh(s2Geo, s2Mat);
      s2Mesh.position.y = baseH + s1H + s2H/2;
      s2Mesh.castShadow = true;
      group.add(s2Mesh);
    }

    // glowing roof slab
    const roofY = H;
    const roofGeo = new THREE.BoxGeometry(baseW+0.1, 0.15, baseW+0.1);
    const roofMat = new THREE.MeshStandardMaterial({
      color: colObj, emissive: colObj, emissiveIntensity: 1.2,
      transparent:true, opacity:0.7
    });
    const roof = new THREE.Mesh(roofGeo, roofMat);
    roof.position.y = baseH; // roof of first setback
    group.add(roof);

    // ── SPIRE / ANTENNA (on tall buildings)
    const spireY = H;
    if(H > 15){
      const spireH = H * 0.18;
      const spireGeo = new THREE.CylinderGeometry(0.04, 0.12, spireH, 6);
      const spireMat = new THREE.MeshStandardMaterial({color:0x1a2e42, metalness:0.9, roughness:0.2});
      const spire = new THREE.Mesh(spireGeo, spireMat);
      spire.position.y = spireY + spireH/2;
      group.add(spire);

      // blinking beacon at tip
      const beaconGeo = new THREE.SphereGeometry(0.22, 8, 8);
      const beaconMat = new THREE.MeshStandardMaterial({
        color:colObj, emissive:colObj, emissiveIntensity:2.0, transparent:true, opacity:0.95
      });
      const beacon = new THREE.Mesh(beaconGeo, beaconMat);
      beacon.position.y = spireY + spireH + 0.22;
      beacon.userData._beacon = {mat:beaconMat, color:colObj.clone(), id:i};
      group.add(beacon);

      // beacon halo
      const haloGeo = new THREE.SphereGeometry(0.8, 8, 8);
      const haloMat = new THREE.MeshStandardMaterial({
        color:colObj, emissive:colObj, emissiveIntensity:0.5,
        transparent:true, opacity:0.08
      });
      const halo = new THREE.Mesh(haloGeo, haloMat);
      halo.position.y = spireY + spireH + 0.22;
      halo.userData._halo = {mat:haloMat, id:i};
      group.add(halo);
    }

    // ── EDGES (wireframe outline for sci-fi look)
    const edgeGeo = new THREE.BoxGeometry(baseW+0.05, H+0.05, baseW+0.05);
    const edgeMat = new THREE.LineBasicMaterial({color:colObj, transparent:true, opacity:0.4});
    const edges = new THREE.LineSegments(new THREE.EdgesGeometry(edgeGeo), edgeMat);
    edges.position.y = H/2;
    group.add(edges);

    // ── POINT LIGHT on rooftop
    const pl = new THREE.PointLight(colObj, 0.8, 22, 2);
    pl.position.y = H + 3;
    group.add(pl);

    // ── LABEL
    const label = makeLabel(repo.name, repo.commitCount, color);
    label.position.y = H + (H>15 ? H*0.18 : 0) + 5;
    label.userData._baseY = label.position.y;
    group.add(label);

    group.userData = {
      ...repo, _color:color, _H:H,
      _edgeMat:edgeMat, _roofMat:roofMat,
      _label:label, _isBuilding:true
    };

    scene.add(group);
    meshes.push({group, repo, color, H});
  });

  return meshes;
}

// ═══════════════════════════════════════════════════════
//  SHOOTING STARS SYSTEM
// ═══════════════════════════════════════════════════════
function createShootingStars(scene){
  const shooters = [];
  const TRAIL_LEN = 32;

  function newShooter(){
    // random start in upper sky
    const startX = (Math.random()-0.5)*800;
    const startY = 80 + Math.random()*120;
    const startZ = (Math.random()-0.5)*800;

    // direction: mostly horizontal with slight downward angle
    const angle = Math.random()*Math.PI*2;
    const speed = 3 + Math.random()*5;
    const vx = Math.cos(angle)*speed;
    const vy = -(0.3+Math.random()*0.8);
    const vz = Math.sin(angle)*speed;

    // trail positions
    const positions = new Float32Array(TRAIL_LEN*3);
    for(let i=0;i<TRAIL_LEN;i++){
      positions[i*3]   = startX;
      positions[i*3+1] = startY;
      positions[i*3+2] = startZ;
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions,3));

    // color: white with slight blue/cyan tint
    const trailColor = Math.random()>.5 ? 0xffffff : 0x88ddff;
    const mat = new THREE.LineBasicMaterial({
      color:trailColor, transparent:true, opacity:0.9,
      blending:THREE.AdditiveBlending, depthWrite:false
    });
    const line = new THREE.Line(geo, mat);
    scene.add(line);

    // head glow sphere
    const headGeo = new THREE.SphereGeometry(0.6,6,6);
    const headMat = new THREE.MeshBasicMaterial({
      color:trailColor, transparent:true, opacity:1.0,
      blending:THREE.AdditiveBlending, depthWrite:false
    });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.set(startX, startY, startZ);
    scene.add(head);

    return {
      line, head, geo, mat, headMat,
      x:startX, y:startY, z:startZ,
      vx, vy, vz,
      trail: Array.from({length:TRAIL_LEN},()=>({x:startX,y:startY,z:startZ})),
      life:0, maxLife:60+Math.random()*80, active:true
    };
  }

  // spawn initial set
  for(let i=0;i<3;i++){
    const s = newShooter();
    s.life = Math.random()*s.maxLife; // stagger
    shooters.push(s);
  }

  function updateShooters(){
    // randomly spawn new ones
    if(Math.random()<0.008 && shooters.filter(s=>s.active).length<6){
      shooters.push(newShooter());
    }

    shooters.forEach((s,si)=>{
      if(!s.active) return;
      s.life++;
      const t = s.life / s.maxLife;

      // move head
      s.x += s.vx; s.y += s.vy; s.z += s.vz;
      s.head.position.set(s.x, s.y, s.z);

      // update trail
      s.trail.unshift({x:s.x,y:s.y,z:s.z});
      if(s.trail.length>TRAIL_LEN) s.trail.pop();

      // write to buffer
      const pos = s.geo.attributes.position.array;
      s.trail.forEach((pt,pi)=>{
        pos[pi*3]=pt.x; pos[pi*3+1]=pt.y; pos[pi*3+2]=pt.z;
      });
      s.geo.attributes.position.needsUpdate=true;

      // fade out at end
      const alpha = t < 0.2 ? t/0.2 : t > 0.8 ? (1-t)/0.2 : 1.0;
      s.mat.opacity = 0.85 * alpha;
      s.headMat.opacity = alpha;
      s.head.scale.setScalar(0.5 + alpha*0.8);

      if(s.life >= s.maxLife){
        scene.remove(s.line); scene.remove(s.head);
        s.line.geometry.dispose(); s.mat.dispose(); s.headMat.dispose();
        shooters.splice(si,1);
      }
    });
  }

  return {updateShooters};
}

// ═══════════════════════════════════════════════════════
//  STARS
// ═══════════════════════════════════════════════════════
function createStarField(scene){
  const COUNT = 8000;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(COUNT*3);
  const sizes = new Float32Array(COUNT);
  const alphas = new Float32Array(COUNT);
  const speeds = new Float32Array(COUNT);

  for(let i=0;i<COUNT;i++){
    // distribute on sphere shell
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos(2*Math.random()-1);
    const r = 400 + Math.random()*100;
    pos[i*3]   = r*Math.sin(phi)*Math.cos(theta);
    pos[i*3+1] = Math.abs(r*Math.cos(phi)); // upper hemisphere only
    pos[i*3+2] = r*Math.sin(phi)*Math.sin(theta);
    sizes[i]  = 0.3 + Math.random()*1.8;
    alphas[i] = 0.4 + Math.random()*0.6;
    speeds[i] = 0.5 + Math.random()*2.5;
  }

  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));

  // use canvas for circular star sprite
  const sc=document.createElement('canvas'); sc.width=32; sc.height=32;
  const sctx=sc.getContext('2d');
  const sg=sctx.createRadialGradient(16,16,0,16,16,16);
  sg.addColorStop(0,'rgba(255,255,255,1)');
  sg.addColorStop(0.3,'rgba(200,220,255,0.8)');
  sg.addColorStop(1,'rgba(100,150,255,0)');
  sctx.fillStyle=sg; sctx.fillRect(0,0,32,32);

  const starMat = new THREE.PointsMaterial({
    map: new THREE.CanvasTexture(sc),
    size: 1.4,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.85,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    vertexColors: false,
    color: 0xffffff
  });

  const stars = new THREE.Points(geo, starMat);
  scene.add(stars);

  // twinkle via opacity animation
  let frame=0;
  function updateStars(){
    frame++;
    // gentle rotate star field
    stars.rotation.y += 0.00008;
    // twinkle: modulate opacity on sine
    const t = frame*0.02;
    starMat.opacity = 0.75 + 0.12*Math.sin(t);
  }

  return {updateStars};
}

// ═══════════════════════════════════════════════════════
//  ENVIRONMENT
// ═══════════════════════════════════════════════════════
function buildEnvironment(scene){
  // ground — wet dark asphalt
  const gGeo = new THREE.PlaneGeometry(500,500);
  const gMat = new THREE.MeshStandardMaterial({
    color:0x030a14, roughness:0.05, metalness:0.9,
    envMapIntensity:0.5
  });
  const ground = new THREE.Mesh(gGeo, gMat);
  ground.rotation.x=-Math.PI/2; ground.receiveShadow=true;
  scene.add(ground);

  // city grid lines (neon road)
  const roadMat = new THREE.LineBasicMaterial({color:0x003a55,transparent:true,opacity:0.12});
  for(let i=-10;i<=10;i++){
    const pts=[new THREE.Vector3(i*11+5.5,-0.01,-120),new THREE.Vector3(i*11+5.5,-0.01,120)];
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),roadMat));
    const pts2=[new THREE.Vector3(-120,-0.01,i*11+5.5),new THREE.Vector3(120,-0.01,i*11+5.5)];
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts2),roadMat));
  }

  // subtle grid helper
  const grid = new THREE.GridHelper(400,80,0x041828,0x020f1c);
  grid.position.y=0.01; scene.add(grid);

  // moon
  const moonGeo = new THREE.SphereGeometry(18,32,32);
  const moonMat = new THREE.MeshStandardMaterial({
    color:0xf0ead8, roughness:0.85,
    emissive:0xf0ead8, emissiveIntensity:0.18
  });
  const moon = new THREE.Mesh(moonGeo, moonMat);
  moon.position.set(180, 220, -280);
  scene.add(moon);

  // moon glow halo
  const mhCv=document.createElement('canvas'); mhCv.width=128;mhCv.height=128;
  const mhCtx=mhCv.getContext('2d');
  const mhG=mhCtx.createRadialGradient(64,64,0,64,64,64);
  mhG.addColorStop(0,'rgba(240,232,200,0.4)');
  mhG.addColorStop(0.5,'rgba(200,210,240,0.12)');
  mhG.addColorStop(1,'rgba(180,200,255,0)');
  mhCtx.fillStyle=mhG; mhCtx.fillRect(0,0,128,128);
  const mhMat=new THREE.SpriteMaterial({map:new THREE.CanvasTexture(mhCv),transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});
  const mhSp=new THREE.Sprite(mhMat);
  mhSp.position.copy(moon.position);
  mhSp.scale.set(120,120,1);
  scene.add(mhSp);

  // distant city silhouette (flat quads at horizon)
  for(let i=0;i<28;i++){
    const angle=(i/28)*Math.PI*2;
    const dist=160+Math.random()*30;
    const h=4+Math.random()*24;
    const w=3+Math.random()*6;
    const bgGeo=new THREE.BoxGeometry(w,h,0.5);
    const bgMat=new THREE.MeshBasicMaterial({color:0x020a16});
    const bgMesh=new THREE.Mesh(bgGeo,bgMat);
    bgMesh.position.set(Math.cos(angle)*dist,h/2,Math.sin(angle)*dist);
    scene.add(bgMesh);
  }

  // nebula/aurora (large plane sprites)
  const nebulas=[
    {col:'rgba(0,100,255,0.035)',x:-80,y:120,z:-200,rx:140,ry:80},
    {col:'rgba(100,0,200,0.025)',x:100,y:160,z:-180,rx:100,ry:60},
    {col:'rgba(0,200,150,0.02)',x:-20,y:90, z:-220,rx:160,ry:50},
  ];
  nebulas.forEach(n=>{
    const nc=document.createElement('canvas'); nc.width=256;nc.height=128;
    const nctx=nc.getContext('2d');
    const ng=nctx.createRadialGradient(128,64,0,128,64,128);
    ng.addColorStop(0,n.col); ng.addColorStop(1,'transparent');
    nctx.fillStyle=ng; nctx.fillRect(0,0,256,128);
    const nMat=new THREE.SpriteMaterial({map:new THREE.CanvasTexture(nc),transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});
    const nSp=new THREE.Sprite(nMat);
    nSp.position.set(n.x,n.y,n.z);
    nSp.scale.set(n.rx,n.ry,1);
    scene.add(nSp);
  });

  // LIGHTS
  scene.add(new THREE.AmbientLight(0x020810, 1.4));
  scene.add(new THREE.HemisphereLight(0x001830, 0x000408, 0.6));

  const moon_light = new THREE.DirectionalLight(0x6699cc, 0.5);
  moon_light.position.set(180,220,-280);
  moon_light.castShadow=true;
  moon_light.shadow.mapSize.set(2048,2048);
  moon_light.shadow.camera.left=-120; moon_light.shadow.camera.right=120;
  moon_light.shadow.camera.top=120; moon_light.shadow.camera.bottom=-120;
  moon_light.shadow.camera.far=600;
  scene.add(moon_light);

  // ground glow fill lights
  [0x001428, 0x080028, 0x002818].forEach((c,i)=>{
    const fl=new THREE.PointLight(c,0.6,80);
    const a=(i/3)*Math.PI*2;
    fl.position.set(Math.cos(a)*40,0.5,Math.sin(a)*40);
    scene.add(fl);
  });

  scene.fog = new THREE.FogExp2(0x000308, 0.006);
}

// ═══════════════════════════════════════════════════════
//  MAIN
// ═══════════════════════════════════════════════════════
async function main(){
  let user={}, repos=[];
  try{
    ({user, repos} = await fetchGitHub());
  } catch(e){
    setLoad(88,'API ERROR — BUILDING WITH SAMPLE DATA...');
  }

  // ── stats
  const totalCommits = repos.reduce((s,r)=>s+r.commitCount,0);
  const totalStars   = repos.reduce((s,r)=>s+(r.stargazers_count||0),0);
  document.getElementById('s-repos').textContent   = repos.length;
  document.getElementById('s-commits').textContent = totalCommits.toLocaleString();
  document.getElementById('s-stars').textContent   = totalStars;

  // ── legend
  const langs=[...new Set(repos.map(r=>r.language).filter(Boolean))];
  const legEl=document.getElementById('leg-items');
  langs.forEach(l=>{
    const c=LANG_COLORS[l]||LANG_COLORS.default;
    legEl.innerHTML+=`<div class="leg-item">
      <div class="leg-swatch" style="background:${c};box-shadow:0 0 6px ${c},0 0 12px ${c}40"></div>
      <span style="color:${c};text-shadow:0 0 8px ${c}60">${l.toUpperCase()}</span>
    </div>`;
  });

  // ── ticker
  const tickerText = repos.map(r=>`${r.name.toUpperCase()} [${r.commitCount} COMMITS]`).join('  ·  ');
  document.getElementById('ticker-inner').textContent = '  ·  ' + tickerText + '  ·  ';

  setLoad(92,'RENDERING SCENE...');

  // ── THREE
  const canvas=document.getElementById('c');
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:'high-performance'});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.5;

  const scene=new THREE.Scene();
  scene.background=new THREE.Color(0x000308);

  const camera=new THREE.PerspectiveCamera(52,window.innerWidth/window.innerHeight,0.1,1200);

  buildEnvironment(scene);
  const cityMeshes = buildCity(scene, repos);
  const {updateShooters} = createShootingStars(scene);
  const {updateStars} = createStarField(scene);

  setLoad(100,'WELCOME TO YOUR CITY');

  // ── show UI
  setTimeout(()=>{
    const ld=document.getElementById('loader');
    ld.style.opacity='0';
    setTimeout(()=>{
      ld.style.display='none';
      document.getElementById('legend').style.display='block';
      document.getElementById('ticker').style.display='flex';
    },800);
  },600);

  // ── CAMERA ORBIT
  let theta=0.5, phi=0.52, radius=120;
  let targetTheta=theta, targetPhi=phi, targetRadius=radius;
  let autoRotate=true, isDrag=false, prevMX=0, prevMY=0;

  canvas.addEventListener('mousedown',e=>{isDrag=true;prevMX=e.clientX;prevMY=e.clientY;autoRotate=false;});
  window.addEventListener('mouseup',()=>isDrag=false);
  window.addEventListener('mousemove',e=>{
    if(!isDrag)return;
    targetTheta-=(e.clientX-prevMX)*0.007;
    targetPhi=Math.max(0.1,Math.min(1.45,targetPhi-(e.clientY-prevMY)*0.006));
    prevMX=e.clientX;prevMY=e.clientY;
  });
  canvas.addEventListener('wheel',e=>{
    targetRadius=Math.max(20,Math.min(200,targetRadius+e.deltaY*0.12));
    e.preventDefault();
  },{passive:false});
  // double click to re-enable autorotate
  canvas.addEventListener('dblclick',()=>autoRotate=!autoRotate);

  // touch
  let prevTD=0,prevTX=0,prevTY=0;
  canvas.addEventListener('touchstart',e=>{
    if(e.touches.length===1){isDrag=true;autoRotate=false;prevTX=e.touches[0].clientX;prevTY=e.touches[0].clientY;}
    if(e.touches.length===2)prevTD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  },{passive:true});
  canvas.addEventListener('touchmove',e=>{
    if(e.touches.length===1&&isDrag){
      targetTheta-=(e.touches[0].clientX-prevTX)*0.01;
      targetPhi=Math.max(0.1,Math.min(1.45,targetPhi-(e.touches[0].clientY-prevTY)*0.009));
      prevTX=e.touches[0].clientX;prevTY=e.touches[0].clientY;
    }
    if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      targetRadius=Math.max(20,Math.min(200,targetRadius-(d-prevTD)*0.25));
      prevTD=d;
    }
  },{passive:true});
  canvas.addEventListener('touchend',()=>isDrag=false,{passive:true});

  // ── RAYCASTER
  const raycaster=new THREE.Raycaster();
  const mouse2d=new THREE.Vector2();
  let hoveredGroup=null;
  const tip=document.getElementById('tip');
  const corners=tip.querySelectorAll('.tip-corner');

  // collect all clickable groups
  const allGroups=[];
  scene.traverse(obj=>{if(obj.isGroup&&obj.userData._isBuilding)allGroups.push(obj);});

  canvas.addEventListener('mousemove',e=>{
    mouse2d.x=(e.clientX/window.innerWidth)*2-1;
    mouse2d.y=-(e.clientY/window.innerHeight)*2+1;
    raycaster.setFromCamera(mouse2d,camera);

    // raycast against all children of building groups
    const testMeshes=[];
    allGroups.forEach(g=>{g.traverse(c=>{if(c.isMesh&&!c.userData._beacon)testMeshes.push(c);});});
    const hits=raycaster.intersectObjects(testMeshes);

    if(hits.length){
      const hitMesh=hits[0].object;
      // find parent group
      let g=hitMesh;
      while(g&&!g.userData._isBuilding)g=g.parent;
      if(!g)return;

      if(g!==hoveredGroup){
        if(hoveredGroup){
          hoveredGroup.userData._edgeMat.opacity=0.4;
          hoveredGroup.userData._roofMat.emissiveIntensity=1.2;
        }
        hoveredGroup=g;
        g.userData._edgeMat.opacity=1.0;
        g.userData._roofMat.emissiveIntensity=3.0;

        const r=g.userData;
        const sc=r._color;
        document.getElementById('tip-bar').style.background=sc;
        document.getElementById('tip-bar').style.boxShadow=`0 0 10px ${sc}`;
        corners.forEach(c=>{ c.style.borderColor=sc; });
        tip.style.borderColor=`${sc}40`;
        document.getElementById('tip-name').textContent=r.name.toUpperCase();
        document.getElementById('tip-commits').textContent=r.commitCount.toLocaleString();
        document.getElementById('tip-commits').style.color=sc;
        document.getElementById('tip-commits').style.textShadow=`0 0 16px ${sc}`;
        const lang=(r.language||'UNKNOWN').toUpperCase();
        document.getElementById('tip-lang').innerHTML=`<span style="color:${sc};letter-spacing:2px">● ${lang}</span>`;
        document.getElementById('tip-desc').textContent=r.description||'No description provided.';
        document.getElementById('tip-meta').textContent=`★ ${r.stargazers_count||0} STARS  ·  ⑂ ${r.forks_count||0} FORKS`;
        tip.style.display='block';
      }
      const pad=16;
      tip.style.left=Math.min(e.clientX+24,window.innerWidth-260-pad)+'px';
      tip.style.top=Math.min(e.clientY-20,window.innerHeight-200-pad)+'px';
      canvas.style.cursor='pointer';
    } else {
      if(hoveredGroup){
        hoveredGroup.userData._edgeMat.opacity=0.4;
        hoveredGroup.userData._roofMat.emissiveIntensity=1.2;
        hoveredGroup=null;
      }
      tip.style.display='none';
      canvas.style.cursor='default';
    }
  });

  canvas.addEventListener('click',()=>{
    if(hoveredGroup&&hoveredGroup.userData.html_url)
      window.open(hoveredGroup.userData.html_url,'_blank');
  });

  window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
  });

  // ── ANIMATE
  let frame=0;
  function animate(){
    requestAnimationFrame(animate);
    frame++;

    if(autoRotate) targetTheta+=0.0025;
    theta+=(targetTheta-theta)*0.055;
    phi+=(targetPhi-phi)*0.055;
    radius+=(targetRadius-radius)*0.055;

    camera.position.x=radius*Math.sin(phi)*Math.cos(theta);
    camera.position.y=radius*Math.cos(phi);
    camera.position.z=radius*Math.sin(phi)*Math.sin(theta);
    camera.lookAt(0, 14, 0);

    // animate beacons + halos + labels
    scene.traverse(obj=>{
      if(obj.userData._beacon){
        const {mat,color,id}=obj.userData._beacon;
        const t=Math.sin(frame*0.07+id*1.3)*0.5+0.5;
        mat.emissiveIntensity=0.8+t*3.0;
        mat.opacity=0.7+t*0.3;
      }
      if(obj.userData._halo){
        const {mat,id}=obj.userData._halo;
        const t=Math.sin(frame*0.07+id*1.3)*0.5+0.5;
        mat.opacity=0.04+t*0.14;
        obj.scale.setScalar(1+t*1.2);
      }
      if(obj.isSprite&&obj.userData._baseY!==undefined){
        obj.position.y=obj.userData._baseY+Math.sin(frame*0.025+obj.id*0.5)*0.3;
      }
    });

    updateShooters();
    updateStars();

    renderer.render(scene,camera);
  }
  animate();
}

main().catch(e=>{
  console.error(e);
  document.getElementById('load-msg').textContent='ERROR: '+e.message;
});
</script>
